# Cross Configuration
# Cross-compilation settings for building native binaries

[build]
# Use pre-built cross images
pre-build = []

[target.x86_64-unknown-linux-gnu]
# Standard Linux target
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:latest"

[target.aarch64-unknown-linux-gnu]
# ARM64 Linux target
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:latest"

[target.x86_64-pc-windows-gnu]
# Windows target
image = "ghcr.io/cross-rs/x86_64-pc-windows-gnu:latest"

[build.env]
passthrough = [
    "CARGO_PROFILE_RELEASE_LTO",
    "CARGO_PROFILE_RELEASE_OPT_LEVEL",
    "CARGO_PROFILE_RELEASE_CODEGEN_UNITS",
]
