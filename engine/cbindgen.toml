# cbindgen Configuration
# Generates C header files for FFI bindings

language = "C"
include_guard = "BS_CALENDAR_CORE_H"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = true
namespace = "bs_calendar"
cpp_compat = true
style = "both"

[export]
include = ["BsDate", "Tithi", "Event"]
exclude = []

[export.rename]
"BsDate" = "BsDate"
"Tithi" = "Tithi"

[parse]
parse_deps = false
include = []
exclude = []

[fn]
rename_args = "GeckoCase"
args = "auto"
sort_by = "Name"

[struct]
rename_fields = "GeckoCase"
derive_constructor = true
derive_eq = false
derive_neq = false

[enum]
rename_variants = "ScreamingSnakeCase"
add_sentinel = false

[const]
allow_static_const = true
allow_constexpr = false

[macro_expansion]
bitflags = true
