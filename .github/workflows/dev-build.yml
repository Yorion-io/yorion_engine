name: Dev Build

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  CARGO_TERM_COLOR: always

# Permissions for GITHUB_TOKEN
permissions:
  contents: write  # Required to create releases and tags
  packages: write  # Required for package publishing (if needed)

jobs:
  validate-commits:
    name: Validate Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cocogitto
        run: cargo binstall --no-confirm cocogitto

      - name: Check conventional commits
        run: cog check --from-latest-tag || echo "No tags yet, skipping"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: engine/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        working-directory: engine
        run: cargo test --all-features

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install wasm-pack
        run: cargo binstall --no-confirm wasm-pack

      - name: Build WASM
        run: bash scripts/build-wasm.sh

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dev
          path: dist/wasm/

  build-native:
    name: Build Native - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: engine/target
          key: ${{ runner.os }}-cargo-target-native-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cbindgen
        run: cargo binstall --no-confirm cbindgen

      - name: Build
        working-directory: engine
        run: cargo build --release --target ${{ matrix.target }}

      - name: Generate C header
        working-directory: engine
        run: cbindgen --config cbindgen.toml --output ../bs_calendar_core.h

      - name: Prepare artifacts
        run: |
          mkdir -p dist/native-${{ matrix.target }}
          cp bs_calendar_core.h dist/native-${{ matrix.target }}/
          
          # Use cp -L to follow symlinks and ensure we get the actual binaries
          find engine/target/${{ matrix.target }}/release -maxdepth 1 \( -name "libbs_calendar_core.dylib" -o -name "libbs_calendar_core.so" -o -name "libbs_calendar_core.a" -o -name "bs_calendar_core.dll" \) -exec cp -L {} dist/native-${{ matrix.target }}/ \;
          
          # Strip symbols to reduce size on macOS
          if [[ "${{ matrix.target }}" == *"apple-darwin"* ]]; then
            # Check if dylib exists before stripping
            if [ -f "dist/native-${{ matrix.target }}/libbs_calendar_core.dylib" ]; then
              strip -x dist/native-${{ matrix.target }}/libbs_calendar_core.dylib
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}-dev
          path: dist/native-${{ matrix.target }}/

  build-universal-macos:
    name: Build Universal macOS Binary
    runs-on: macos-latest
    needs: [test, build-native]
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-x86_64-apple-darwin-dev
          path: artifacts/macos-x86_64/

      - name: Download macOS aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-aarch64-apple-darwin-dev
          path: artifacts/macos-aarch64/

      - name: Create universal binary
        run: |
          mkdir -p dist/native-macos-universal
          
          # Copy header file
          cp artifacts/macos-x86_64/bs_calendar_core.h dist/native-macos-universal/
          
          # Check if dylibs exist and are not empty
          ls -lh artifacts/macos-x86_64/libbs_calendar_core.dylib
          ls -lh artifacts/macos-aarch64/libbs_calendar_core.dylib

          # Create universal binary using lipo
          lipo -create \
            artifacts/macos-x86_64/libbs_calendar_core.dylib \
            artifacts/macos-aarch64/libbs_calendar_core.dylib \
            -output dist/native-macos-universal/libbs_calendar_core.dylib
          
          # Verify the universal binary
          echo "Universal binary info:"
          lipo -info dist/native-macos-universal/libbs_calendar_core.dylib
          file dist/native-macos-universal/libbs_calendar_core.dylib
          ls -lh dist/native-macos-universal/libbs_calendar_core.dylib

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-universal-dev
          path: dist/native-macos-universal/

  create-dev-release:
    name: Create Dev Pre-release
    runs-on: ubuntu-latest
    needs: [build-wasm, build-native, build-universal-macos]
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' engine/Cargo.toml | head -1 | cut -d'"' -f2)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          DEV_VERSION="${VERSION}-dev.${GITHUB_RUN_NUMBER}+${COMMIT_SHORT}"
          echo "version=${DEV_VERSION}" >> $GITHUB_OUTPUT
          echo "Dev version: ${DEV_VERSION}"

      - name: Create archives
        run: |
          mkdir -p release
          cd artifacts
          for dir in */; do
            tar -czf "../release/${dir%/}-${{ steps.version.outputs.version }}.tar.gz" "$dir"
          done
          cd ../release
          shasum -a 256 *.tar.gz > SHA256SUMS

      - name: Create pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Dev Build v${{ steps.version.outputs.version }}
          prerelease: true
          files: release/*
          body: |
            ## Development Build
            
            This is an automated development build from the `dev` branch.
            
            **Commit:** ${{ github.sha }}
            **Build:** #${{ github.run_number }}
            
            ### Artifacts
            - WASM bindings (for NestJS/web)
            - Universal macOS binary (Intel + Apple Silicon)
            
            ⚠️ This is a pre-release build for testing purposes.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN_PAT }}
