name: Dev Build

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  CARGO_TERM_COLOR: always

# Permissions for GITHUB_TOKEN
permissions:
  contents: write  # Required to create releases and tags
  packages: write  # Required for package publishing (if needed)

jobs:
  validate-commits:
    name: Validate Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cocogitto
        run: cargo binstall --no-confirm cocogitto

      - name: Check conventional commits
        run: cog check --from-latest-tag || echo "No tags yet, skipping"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: engine/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        working-directory: engine
        run: cargo test --all-features

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install wasm-pack
        run: cargo binstall --no-confirm wasm-pack

      - name: Build WASM
        run: bash scripts/build-wasm.sh

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dev
          path: dist/wasm/

  build-macos-x86:
    name: Build macOS (x86_64)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}

      - name: Build x86_64
        run: |
          chmod +x scripts/build-macos-x86.sh
          ./scripts/build-macos-x86.sh

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86-dev
          path: dist/x86_64/libbs_calendar_core.a

  build-macos-arm64:
    name: Build macOS (arm64)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}

      - name: Build arm64 & Bindings
        run: |
          chmod +x scripts/build-macos-arm64.sh
          ./scripts/build-macos-arm64.sh

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dev
          path: dist/aarch64/libbs_calendar_core.a

      - name: Upload bindings
        uses: actions/upload-artifact@v4
        with:
          name: swift-bindings-dev
          path: dist/swift/

  package-macos:
    name: Package macOS
    runs-on: macos-latest
    needs: [build-macos-x86, build-macos-arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x86-dev
          path: dist/x86_64/

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-dev
          path: dist/aarch64/

      - name: Download bindings
        uses: actions/download-artifact@v4
        with:
          name: swift-bindings-dev
          path: dist/swift/

      - name: Package XCFramework
        run: |
          chmod +x scripts/package-macos.sh
          ./scripts/package-macos.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts-dev
          path: |
            dist/BsCalendarCore.xcframework
            dist/swift/bs_calendar_core.swift

  create-dev-release:
    name: Create Dev Pre-release
    runs-on: ubuntu-latest
    needs: [build-wasm, package-macos]
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' engine/Cargo.toml | head -1 | cut -d'"' -f2)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          DEV_VERSION="${VERSION}-dev.${GITHUB_RUN_NUMBER}+${COMMIT_SHORT}"
          echo "version=${DEV_VERSION}" >> $GITHUB_OUTPUT
          echo "Dev version: ${DEV_VERSION}"

      - name: Create archives
        run: |
          mkdir -p release
          cd artifacts
          for dir in */; do
            tar -czf "../release/${dir%/}-${{ steps.version.outputs.version }}.tar.gz" "$dir"
          done
          cd ../release
          shasum -a 256 *.tar.gz > SHA256SUMS

      - name: Create pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Dev Build v${{ steps.version.outputs.version }}
          prerelease: true
          files: release/*
          body: |
            ## Development Build
            
            This is an automated development build from the `dev` branch.
            
            **Commit:** ${{ github.sha }}
            **Build:** #${{ github.run_number }}
            
            ### Artifacts
            - WASM bindings (for NestJS/web)
            
            ⚠️ This is a pre-release build for testing purposes.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN_PAT }}
