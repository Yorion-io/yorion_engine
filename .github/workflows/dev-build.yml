name: Dev Build

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  CARGO_TERM_COLOR: always

# Permissions for GITHUB_TOKEN
permissions:
  contents: write  # Required to create releases and tags
  packages: write  # Required for package publishing (if needed)

jobs:
  validate-commits:
    name: Validate Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cocogitto
        run: cargo install --locked cocogitto

      - name: Check conventional commits
        run: cog check --from-latest-tag || echo "No tags yet, skipping"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: engine/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        working-directory: engine
        run: cargo test --all-features

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        run: bash scripts/build-wasm.sh

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dev
          path: dist/wasm/

  build-native:
    name: Build Native - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Build
        working-directory: engine
        run: cargo build --release --target ${{ matrix.target }}

      - name: Generate C header
        working-directory: engine
        run: cbindgen --config cbindgen.toml --output ../bs_calendar_core.h

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}-dev
          path: |
            engine/target/${{ matrix.target }}/release/libbs_calendar_core.*
            bs_calendar_core.h

  create-dev-release:
    name: Create Dev Pre-release
    runs-on: ubuntu-latest
    needs: [build-wasm, build-native]
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' engine/Cargo.toml | head -1 | cut -d'"' -f2)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          DEV_VERSION="${VERSION}-dev.${GITHUB_RUN_NUMBER}+${COMMIT_SHORT}"
          echo "version=${DEV_VERSION}" >> $GITHUB_OUTPUT
          echo "Dev version: ${DEV_VERSION}"

      - name: Create archives
        run: |
          mkdir -p release
          cd artifacts
          for dir in */; do
            tar -czf "../release/${dir%/}-${{ steps.version.outputs.version }}.tar.gz" "$dir"
          done
          cd ../release
          shasum -a 256 *.tar.gz > SHA256SUMS

      - name: Create pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Dev Build v${{ steps.version.outputs.version }}
          prerelease: true
          files: release/*
          body: |
            ## Development Build
            
            This is an automated development build from the `dev` branch.
            
            **Commit:** ${{ github.sha }}
            **Build:** #${{ github.run_number }}
            
            ### Artifacts
            - WASM bindings
            - Native libraries (macOS, Linux)
            
            ⚠️ This is a pre-release build for testing purposes.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN_PAT }}
