name: Release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

# Permissions for GITHUB_TOKEN
permissions:
  contents: write  # Required to create releases, tags, and push commits
  packages: write  # Required for package publishing (if needed)

jobs:
  validate-and-version:
    name: Validate & Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:     
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cocogitto
        run: cargo binstall --no-confirm cocogitto

      - name: Check conventional commits
        run: cog check

      - name: Determine next version
        id: version
        run: |
          # Get current version from Cargo.toml
          CURRENT_VERSION=$(grep '^version' engine/Cargo.toml | head -1 | cut -d'"' -f2)
          
          # Check if there are new commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            # No tags yet, use version from Cargo.toml
            NEXT_VERSION="$CURRENT_VERSION"
            SHOULD_RELEASE="true"
          else
            # Check if there are new commits
            NEW_COMMITS=$(git rev-list ${LAST_TAG}..HEAD --count)
            if [ "$NEW_COMMITS" -eq "0" ]; then
              echo "No new commits since last release"
              SHOULD_RELEASE="false"
              NEXT_VERSION="$CURRENT_VERSION"
            else
              # Use cocogitto to bump version
              cog bump --auto --dry-run > bump_output.txt || true
              NEXT_VERSION=$(cat bump_output.txt | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "$CURRENT_VERSION")
              SHOULD_RELEASE="true"
            fi
          fi
          
          echo "version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "should_release=${SHOULD_RELEASE}" >> $GITHUB_OUTPUT
          echo "Next version: ${NEXT_VERSION}"
          echo "Should release: ${SHOULD_RELEASE}"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate-and-version
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        working-directory: engine
        run: cargo test --all-features

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [validate-and-version, test]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install wasm-pack
        run: cargo binstall --no-confirm wasm-pack

      - name: Build WASM
        run: bash scripts/build-wasm.sh

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: dist/wasm/

  build-native:
    name: Build Native - ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: [validate-and-version, test]
    if: needs.validate-and-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: engine/target
          key: ${{ runner.os }}-cargo-target-native-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cross
        if: matrix.use_cross
        run: cargo binstall --no-confirm cross

      - name: Install cbindgen
        run: cargo binstall --no-confirm cbindgen

      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        working-directory: engine
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build with cross
        if: matrix.use_cross
        working-directory: engine
        run: cross build --release --target ${{ matrix.target }}

      - name: Generate C header
        working-directory: engine
        run: cbindgen --config cbindgen.toml --output ../bs_calendar_core.h || cbindgen --output ../bs_calendar_core.h

      - name: Prepare artifacts
        run: |
          mkdir -p dist/native-${{ matrix.name }}
          cp bs_calendar_core.h dist/native-${{ matrix.name }}/
          
          # Use cp -L to follow symlinks and ensure we get the actual binaries
          find engine/target/${{ matrix.target }}/release -maxdepth 1 \( -name "libbs_calendar_core.dylib" -o -name "libbs_calendar_core.so" -o -name "libbs_calendar_core.a" -o -name "bs_calendar_core.dll" \) -exec cp -L {} dist/native-${{ matrix.name }}/ \;
          
          # Strip symbols to reduce size on macOS
          if [[ "${{ matrix.target }}" == *"apple-darwin"* ]]; then
            # Check if dylib exists before stripping
            if [ -f "dist/native-${{ matrix.name }}/libbs_calendar_core.dylib" ]; then
              strip -x dist/native-${{ matrix.name }}/libbs_calendar_core.dylib
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.name }}
          path: dist/native-${{ matrix.name }}/

  build-universal-macos:
    name: Build Universal macOS Binary
    runs-on: macos-latest
    needs: [validate-and-version, build-native]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-macos-x86_64
          path: artifacts/macos-x86_64/

      - name: Download macOS aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-macos-aarch64
          path: artifacts/macos-aarch64/

      - name: Create universal binary
        run: |
          mkdir -p dist/native-macos-universal
          
          # Copy header file
          cp artifacts/macos-x86_64/bs_calendar_core.h dist/native-macos-universal/
          
          # Check if dylibs exist and are not empty
          ls -lh artifacts/macos-x86_64/libbs_calendar_core.dylib
          ls -lh artifacts/macos-aarch64/libbs_calendar_core.dylib

          # Create universal binary using lipo
          lipo -create \
            artifacts/macos-x86_64/libbs_calendar_core.dylib \
            artifacts/macos-aarch64/libbs_calendar_core.dylib \
            -output dist/native-macos-universal/libbs_calendar_core.dylib
          
          # Verify the universal binary
          echo "Universal binary info:"
          lipo -info dist/native-macos-universal/libbs_calendar_core.dylib
          file dist/native-macos-universal/libbs_calendar_core.dylib
          ls -lh dist/native-macos-universal/libbs_calendar_core.dylib

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-universal
          path: dist/native-macos-universal/

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate-and-version, build-wasm, build-native, build-universal-macos]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install git-cliff
        run: cargo binstall --no-confirm git-cliff

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: artifacts/wasm/

      - name: Download Universal macOS Binary
        uses: actions/download-artifact@v4
        with:
          name: native-macos-universal
          path: artifacts/native-macos-universal/

      - name: Create archives
        run: |
          VERSION="${{ needs.validate-and-version.outputs.version }}"
          mkdir -p release
          
          # WASM archive
          if [ -d "artifacts/wasm" ]; then
            tar -czf "release/bs_calendar_core-wasm-${VERSION}.tar.gz" -C artifacts wasm/
          fi
          
          # Native archives
          for dir in artifacts/native-*/; do
            if [ -d "$dir" ]; then
              platform=$(basename "$dir" | sed 's/native-//')
              tar -czf "release/bs_calendar_core-native-${platform}-${VERSION}.tar.gz" -C artifacts "$(basename $dir)"
            fi
          done
          
          # Generate checksums
          cd release
          shasum -a 256 *.tar.gz > SHA256SUMS
          cd ..

      - name: Generate changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git cliff --unreleased --strip all > CHANGELOG_RELEASE.md
          else
            git cliff ${LAST_TAG}..HEAD --strip all > CHANGELOG_RELEASE.md
          fi

      - name: Update Cargo.toml version
        run: |
          VERSION="${{ needs.validate-and-version.outputs.version }}"
          sed -i.bak "s/^version = .*/version = \"${VERSION}\"/" engine/Cargo.toml
          rm engine/Cargo.toml.bak

      - name: Commit version bump
        run: |
          VERSION="${{ needs.validate-and-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add engine/Cargo.toml
          git commit -m "chore(release): bump version to ${VERSION}" || echo "No changes to commit"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate-and-version.outputs.version }}
          name: Release v${{ needs.validate-and-version.outputs.version }}
          body_path: CHANGELOG_RELEASE.md
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN_PAT }}
