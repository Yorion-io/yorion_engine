name: Release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

# Permissions for GITHUB_TOKEN
permissions:
  contents: write  # Required to create releases, tags, and push commits
  packages: write  # Required for package publishing (if needed)
  actions: write   # Required to cancel workflow on failure

jobs:
  validate-and-version:
    name: Validate & Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:     
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cocogitto
        run: cargo binstall --no-confirm cocogitto

      - name: Check conventional commits
        run: cog check

      - name: Determine next version
        id: version
        run: |
          # Get current version from Cargo.toml
          CURRENT_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' engine/Cargo.toml | head -1)
          echo "Current version from Cargo.toml: ${CURRENT_VERSION}"
          
          # Check if there are new commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Last tag found: ${LAST_TAG}"
          
          if [ -z "$LAST_TAG" ]; then
            # No tags yet, use version from Cargo.toml
            NEXT_VERSION="$CURRENT_VERSION"
            SHOULD_RELEASE="true"
          else
            # Check if there are new commits
            NEW_COMMITS=$(git rev-list ${LAST_TAG}..HEAD --count)
            echo "New commits since last tag: ${NEW_COMMITS}"
            
            if [ "$NEW_COMMITS" -eq "0" ]; then
              echo "No new commits since last release"
              SHOULD_RELEASE="false"
              NEXT_VERSION="$CURRENT_VERSION"
            else
              # Use cocogitto to bump version
              BUMP_OUTPUT=$(cog bump --auto --dry-run 2>&1 || true)
              echo "BUMP_OUTPUT: ${BUMP_OUTPUT}"
              
              NEXT_VERSION=$(echo "$BUMP_OUTPUT" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              if [ -z "$NEXT_VERSION" ]; then
                echo "Warning: NEXT_VERSION not detected by cog, falling back to CURRENT_VERSION"
                NEXT_VERSION="$CURRENT_VERSION"
              fi
              SHOULD_RELEASE="true"
            fi
          fi
          
          echo "version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "should_release=${SHOULD_RELEASE}" >> $GITHUB_OUTPUT
          echo "Final version set: ${NEXT_VERSION}"
          echo "Should release set: ${SHOULD_RELEASE}"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate-and-version
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Run tests
        working-directory: engine
        run: cargo test --all-features

  generate-bindings:
    name: Generate Bindings
    runs-on: ubuntu-latest
    needs: [validate-and-version, test]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Generate Bindings
        run: |
          chmod +x scripts/generate-swift-bindings.sh
          ./scripts/generate-swift-bindings.sh

      - name: Upload bindings
        uses: actions/upload-artifact@v4
        with:
          name: swift-bindings
          path: dist/swift/

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [validate-and-version, test]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install wasm-pack
        run: cargo binstall --no-confirm wasm-pack

      - name: Install wasm-bindgen-cli
        run: cargo binstall --no-confirm wasm-bindgen-cli

      - name: Build WASM
        run: bash scripts/build-wasm.sh

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: dist/wasm/

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  build-macos-x86:
    name: Build macOS (x86_64)
    runs-on: macos-latest
    needs: [validate-and-version, test]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build x86_64
        run: |
          chmod +x scripts/build-macos-x86.sh
          ./scripts/build-macos-x86.sh

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86
          path: dist/x86_64/libyorion_engine.a

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  build-macos-arm64:
    name: Build macOS (arm64)
    runs-on: macos-latest
    needs: [validate-and-version, test]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build arm64
        run: |
          chmod +x scripts/build-macos-arm64.sh
          ./scripts/build-macos-arm64.sh

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/aarch64/libyorion_engine.a

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  package-macos:
    name: Package macOS
    runs-on: macos-latest
    needs: [build-macos-x86, build-macos-arm64, generate-bindings]
    steps:
      - uses: actions/checkout@v4

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x86
          path: dist/x86_64/

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: dist/aarch64/

      - name: Download bindings
        uses: actions/download-artifact@v4
        with:
          name: swift-bindings
          path: dist/swift/

      - name: Package XCFramework
        run: |
          chmod +x scripts/package-macos.sh
          ./scripts/package-macos.sh

      - name: Upload Apple artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apple-assets
          path: |
            dist/BsCalendarCore.xcframework
            dist/swift/yorion_engine.swift

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate-and-version, build-wasm, package-macos]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash



      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create archives
        run: |
          VERSION="${{ needs.validate-and-version.outputs.version }}"
          mkdir -p release
          cd artifacts
          
          # Handle apple-assets (contains directory and file)
          if [ -d "apple-assets" ]; then
            tar -czf "../release/apple-assets-${VERSION}.tar.gz" -C apple-assets .
          fi
          
          # Handle wasm (rename to wasm-assets)
          if [ -d "wasm" ]; then
            tar -czf "../release/wasm-assets-${VERSION}.tar.gz" -C wasm .
          fi
          
          # Generate checksums
          cd ../release
          shasum -a 256 *.tar.gz > SHA256SUMS
          cd ..

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag v${{ needs.validate-and-version.outputs.version }} --unreleased --strip all
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: Update Cargo.toml version
        run: |
          VERSION="${{ needs.validate-and-version.outputs.version }}"
          sed -i.bak "s/^version = .*/version = \"${VERSION}\"/" engine/Cargo.toml
          rm engine/Cargo.toml.bak

      - name: Commit version bump
        run: |
          VERSION="${{ needs.validate-and-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add engine/Cargo.toml
          git commit -m "chore(release): bump version to ${VERSION}" || echo "No changes to commit"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate-and-version.outputs.version }}
          name: Release v${{ needs.validate-and-version.outputs.version }}
          body_path: CHANGELOG_RELEASE.md
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN_PAT }}
