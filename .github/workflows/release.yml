name: Release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

# Permissions for GITHUB_TOKEN
permissions:
  contents: write  # Required to create releases, tags, and push commits
  packages: write  # Required for package publishing (if needed)

jobs:
  validate-and-version:
    name: Validate & Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:     
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cocogitto
        run: cargo binstall --no-confirm cocogitto

      - name: Check conventional commits
        run: cog check

      - name: Determine next version
        id: version
        run: |
          # Get current version from Cargo.toml
          CURRENT_VERSION=$(grep '^version' engine/Cargo.toml | head -1 | cut -d'"' -f2)
          
          # Check if there are new commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            # No tags yet, use version from Cargo.toml
            NEXT_VERSION="$CURRENT_VERSION"
            SHOULD_RELEASE="true"
          else
            # Check if there are new commits
            NEW_COMMITS=$(git rev-list ${LAST_TAG}..HEAD --count)
            if [ "$NEW_COMMITS" -eq "0" ]; then
              echo "No new commits since last release"
              SHOULD_RELEASE="false"
              NEXT_VERSION="$CURRENT_VERSION"
            else
              # Use cocogitto to bump version
              cog bump --auto --dry-run > bump_output.txt || true
              NEXT_VERSION=$(cat bump_output.txt | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "$CURRENT_VERSION")
              SHOULD_RELEASE="true"
            fi
          fi
          
          echo "version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "should_release=${SHOULD_RELEASE}" >> $GITHUB_OUTPUT
          echo "Next version: ${NEXT_VERSION}"
          echo "Should release: ${SHOULD_RELEASE}"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate-and-version
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        working-directory: engine
        run: cargo test --all-features

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [validate-and-version, test]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install wasm-pack
        run: cargo binstall --no-confirm wasm-pack

      - name: Build WASM
        run: bash scripts/build-wasm.sh

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: dist/wasm/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [validate-and-version, test]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}

      - name: Build macOS artifacts
        run: |
          chmod +x scripts/build-macos.sh
          ./scripts/build-macos.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            dist/BsCalendarCore.xcframework
            dist/swift/bs_calendar_core.swift

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate-and-version, build-wasm, build-macos]
    if: needs.validate-and-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install git-cliff
        run: cargo binstall --no-confirm git-cliff

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: artifacts/wasm/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos/

      - name: Create archives
        run: |
          VERSION="${{ needs.validate-and-version.outputs.version }}"
          mkdir -p release
          
          # WASM archive
          if [ -d "artifacts/wasm" ]; then
            tar -czf "release/bs_calendar_core-wasm-${VERSION}.tar.gz" -C artifacts wasm/
          fi

          # macOS Archive
          if [ -d "artifacts/macos" ]; then
             # Zip the XCFramework
             cd artifacts/macos
             zip -r "../../release/BsCalendarCore.xcframework.zip" BsCalendarCore.xcframework
             cp bs_calendar_core.swift "../../release/bs_calendar_core.swift"
             cd ../..
          fi
          
          # Generate checksums
          cd release
          shasum -a 256 *.tar.gz > SHA256SUMS
          cd ..

      - name: Create macOS release archive
        if: needs.validate-and-version.outputs.should_release == 'true'
        run: |
          VERSION="${{ needs.validate-and-version.outputs.version }}"
          mkdir -p release
          
          if [ -d "artifacts/macos/BsCalendarCore.xcframework" ]; then
             echo "📦 Packaging macOS artifacts..."
             cd artifacts/macos
             
             # Create a zip containing both the XCFramework and the Swift bindings
             zip -r "../../release/BsCalendarCore-macos-${VERSION}.zip" BsCalendarCore.xcframework bs_calendar_core.swift
             
             cd ../..
             
             # Calculate checksum for the new zip
             cd release
             shasum -a 256 "BsCalendarCore-macos-${VERSION}.zip" >> SHA256SUMS
             cd ..
          fi

      - name: Generate changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git cliff --unreleased --strip all > CHANGELOG_RELEASE.md
          else
            git cliff ${LAST_TAG}..HEAD --strip all > CHANGELOG_RELEASE.md
          fi

      - name: Update Cargo.toml version
        run: |
          VERSION="${{ needs.validate-and-version.outputs.version }}"
          sed -i.bak "s/^version = .*/version = \"${VERSION}\"/" engine/Cargo.toml
          rm engine/Cargo.toml.bak

      - name: Commit version bump
        run: |
          VERSION="${{ needs.validate-and-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add engine/Cargo.toml
          git commit -m "chore(release): bump version to ${VERSION}" || echo "No changes to commit"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate-and-version.outputs.version }}
          name: Release v${{ needs.validate-and-version.outputs.version }}
          body_path: CHANGELOG_RELEASE.md
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN_PAT }}
